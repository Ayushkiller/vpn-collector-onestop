name: Debug build

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    if: github.ref != 'refs/heads/playstore'
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: 'recursive'

    - uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    - run: ./gradlew assembleStandardDebug -PdoNotStrip

    - name: Rename APK
      run: |
        mkdir -p out
        cp "$(find app/build/outputs/apk/standard/debug -name '*.apk' | head -1)" out/VPN-Detect-Collector-onestop.apk

    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: vpn-detect-collector-onestop-apk
        path: out/VPN-Detect-Collector-onestop.apk
